<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Katana Market · SNIPER DUELS</title>
  <meta name="description" content="Live Katana price reference for SNIPER DUELS traders — sell & buy averages across all skins, qualities, and FragTracker variants.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <h1><span class="accent">Katana</span> Market</h1>
        <span class="sub">SNIPER DUELS · trader reference</span>
      </div>
      <div class="segment" role="tablist" aria-label="market side">
        <button data-mode="sell" class="active" role="tab">Selling</button>
        <button data-mode="buy" role="tab">Buying</button>
      </div>
    </header>

    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
        <path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <input id="search" class="search" type="text" autocomplete="off"
             placeholder='Search skins — try "crimson", "crimson katana", or even "katana orochi"'>
    </div>

    <div id="grid" class="grid"></div>

    <footer>
      Prices aggregated from community trading channels — averages, not official values. Hover any price for min/max.
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
